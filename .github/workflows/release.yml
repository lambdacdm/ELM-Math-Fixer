name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building ELM-Math-Fixer v$VERSION"

      - name: Create package zip
        run: |
          ZIP_NAME="ELM-Math-Fixer-v${{ steps.version.outputs.version }}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json math-core.js math-repair.js content.js runtime.js \
            prompts.js ui.css README.md LICENSE THIRD_PARTY_NOTICES.md \
            icons/ katex/
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
        id: package

      - name: Create Release
        uses: softprops/action-gh-release@v2.2.1
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ELM Math Fixer v${{ steps.version.outputs.version }}

            See [README](https://github.com/${{ github.repository }}) for installation instructions.
          files: ${{ steps.package.outputs.zip_name }}
          generate_release_notes: true
