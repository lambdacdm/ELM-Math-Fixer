name: Verify and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Static and metadata checks
        run: npm run check
      - name: Browser regression tests
        run: npm test

  package:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      zip: ${{ steps.metadata.outputs.zip }}
    steps:
      - uses: actions/checkout@v4
      - id: metadata
        name: Read and validate version
        shell: pwsh
        run: |
          $manifest = Get-Content manifest.json -Raw | ConvertFrom-Json
          $version = [string]$manifest.version
          if ($env:GITHUB_REF -like 'refs/tags/*' -and $env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match manifest version v$version."
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip=ELM-Math-Fixer-v$version.zip" >> $env:GITHUB_OUTPUT
      - name: Build extension ZIP
        shell: pwsh
        run: ./build.ps1 -OutputPath "${{ steps.metadata.outputs.zip }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ELM-Math-Fixer-v${{ steps.metadata.outputs.version }}
          path: ${{ steps.metadata.outputs.zip }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ELM-Math-Fixer-v${{ needs.package.outputs.version }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.package.outputs.zip }}
          generate_release_notes: true
